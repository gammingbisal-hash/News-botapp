<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock News AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'Noto Sans Bengali',sans-serif;min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:rgba(7,9,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.07);padding:12px 16px}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#00e5a0,#3b9eff);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.title{font-weight:800;font-size:15px}
.live{color:#00e5a0;font-size:10px;display:flex;align-items:center;gap:4px;margin-top:2px}
.dot{width:6px;height:6px;border-radius:50%;background:#00e5a0;animation:pulse 1.5s infinite;flex-shrink:0}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.btn{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.btn.active{background:rgba(0,229,160,0.15);border-color:rgba(0,229,160,0.35);color:#00e5a0;font-weight:700}
.ticker{background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(255,255,255,0.05);height:28px;display:flex;align-items:center;overflow:hidden}
.ticker-live{background:#ef4444;color:#fff;padding:0 10px;height:100%;display:flex;align-items:center;font-size:9px;font-weight:800;letter-spacing:1px;flex-shrink:0}
.ticker-text{white-space:nowrap;color:rgba(255,255,255,0.5);font-size:10px;animation:marquee 40s linear infinite;display:inline-block;padding-left:100%}
.stats{background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.04);padding:6px 16px;display:flex;gap:14px;overflow-x:auto}
.stats::-webkit-scrollbar{display:none}
.stat{flex-shrink:0;font-size:11px;color:rgba(255,255,255,0.35);display:flex;gap:4px}
.stat span{color:#00e5a0;font-weight:700}
.content{max-width:780px;margin:0 auto;padding:14px 14px 40px;display:flex;flex-direction:column;gap:10px}
.bulk-btn{width:100%;padding:12px;border-radius:14px;background:linear-gradient(135deg,rgba(0,229,160,0.1),rgba(59,158,255,0.1));border:1px solid rgba(0,229,160,0.2);color:#00e5a0;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;overflow:hidden;animation:fadeUp 0.3s ease}
.card-body{padding:13px 15px}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:700}
.card-time{color:rgba(255,255,255,0.3);font-size:10px}
.card-title{color:#fff;font-size:13.5px;line-height:1.6;font-weight:500;margin-bottom:8px}
.card-excerpt{color:rgba(255,255,255,0.4);font-size:11.5px;line-height:1.6;margin-bottom:10px}
.card-actions{display:flex;gap:7px}
.analyze-btn{flex:1;padding:8px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);color:rgba(255,255,255,0.55);font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all 0.2s}
.analyze-btn.done{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.25);color:#00e5a0}
.link-btn{padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);font-size:12px;text-decoration:none;display:flex;align-items:center}
.ai-panel{border-top:1px solid rgba(0,229,160,0.1);background:rgba(0,229,160,0.04);padding:14px 15px}
.ai-header{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#00e5a0;animation:pulse 2s infinite}
.ai-label{color:#00e5a0;font-size:11px;font-weight:700}
.sentiment{margin-left:auto;font-size:10px;padding:1px 8px;border-radius:20px;font-weight:700}
.ai-text{color:rgba(255,255,255,0.82);font-size:13px;line-height:1.85;white-space:pre-wrap}
.loading{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3)}
.spin{display:inline-block;font-size:32px;animation:spin 1.5s linear infinite;margin-bottom:10px}
.ldots{display:inline-flex;gap:5px;align-items:center}
.ldots span{width:6px;height:6px;border-radius:50%;background:#00e5a0;animation:tdot 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(0,229,160,0.2);border-radius:10px}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">📰</div>
    <div style="flex:1">
      <div class="title">Stock News AI</div>
      <div class="live"><span class="dot"></span>Real-time · AI বাংলা বিশ্লেষণ <span id="lastUp" style="color:rgba(255,255,255,0.2);margin-left:4px"></span></div>
    </div>
    <button class="btn active" id="autoBtn" onclick="toggleAuto()">⏱ AUTO</button>
    <button class="btn" id="refBtn" onclick="loadNews()" style="font-size:16px">🔄</button>
  </div>
  <div class="filters" id="filters"></div>
</div>
<div class="ticker"><div class="ticker-live">LIVE</div><div style="overflow:hidden;flex:1"><div class="ticker-text" id="ticker">লোড হচ্ছে...</div></div></div>
<div class="stats">
  <div class="stat">📰 মোট: <span id="sTotal">—</span></div>
  <div class="stat">🤖 বিশ্লেষিত: <span id="sAnal">0</span></div>
  <div class="stat">⏱ পরবর্তী: <span id="sNext">৫ মিনিটে</span></div>
</div>
<div class="content" id="content"><div class="loading"><div class="spin">⟳</div><div>News লোড হচ্ছে...</div></div></div>
<script>
let news=[],filter="সব",autoOn=true,timer=null,analyzed=0,sums={};
function ago(d){const s=(Date.now()-new Date(d))/1000;if(s<60)return"এইমাত্র";if(s<3600)return`${Math.floor(s/60)} মিনিট আগে`;if(s<86400)return`${Math.floor(s/3600)} ঘণ্টা আগে`;return`${Math.floor(s/86400)} দিন আগে`}
function sc(t){if(!t)return"#f59e0b";const l=t.toLowerCase();if(l.includes("bullish"))return"#00e5a0";if(l.includes("bearish"))return"#ef4444";return"#f59e0b"}
function sl(t){if(!t)return"NEUTRAL ⚖️";const l=t.toLowerCase();if(l.includes("bullish"))return"BULLISH 📈";if(l.includes("bearish"))return"BEARISH 📉";return"NEUTRAL ⚖️"}
async function loadNews(){
  document.getElementById("refBtn").style.animation="spin 1s linear infinite";
  try{
    const r=await fetch("/api/news");
    const d=await r.json();
    news=d.data||[];
    document.getElementById("sTotal").textContent=news.length;
    document.getElementById("lastUp").textContent="· এইমাত্র";
    const t=news.slice(0,10).map(n=>`📰 ${n.title}`).join("   ·   ");
    document.getElementById("ticker").textContent=t+"   "+t;
    buildFilters();renderNews();
  }catch(e){document.getElementById("content").innerHTML=`<div style="background:rgba(255,68,102,0.08);border:1px solid rgba(255,68,102,0.2);border-radius:14px;padding:16px;color:#ef4444;font-size:13px">❌ News লোড হয়নি। Vercel deploy সম্পন্ন হয়েছে?</div>`}
  document.getElementById("refBtn").style.animation="";
}
function buildFilters(){
  const srcs=["সব",...new Set(news.map(n=>n.source))];
  document.getElementById("filters").innerHTML=srcs.map(s=>`<button class="btn ${filter===s?"active":""}" onclick="setF('${s}')">${s}</button>`).join("");
}
function setF(f){filter=f;buildFilters();renderNews()}
function renderNews(){
  const list=filter==="সব"?news:news.filter(n=>n.source===filter);
  if(!list.length){document.getElementById("content").innerHTML='<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3)">কোনো news নেই।</div>';return}
  let h=`<button class="bulk-btn" onclick="bulk()">🤖 Top 5 News এর বাংলা বিশ্লেষণ একসাথে করো</button>`;
  list.forEach((n,i)=>{
    const has=sums[n.id];
    h+=`<div class="card" id="c${i}">
      <div class="card-body">
        <div class="card-meta">
          <span class="badge" style="background:${n.color}22;color:${n.color}">${n.source}</span>
          <span class="card-time">${ago(n.time)}</span>
        </div>
        <div class="card-title">${n.title}</div>
        ${n.content?`<div class="card-excerpt">${n.content.slice(0,100)}...</div>`:""}
        <div class="card-actions">
          <button class="analyze-btn ${has?"done":""}" onclick="analyze('${n.id}',${i})" id="ab${i}">
            ${has?"🤖 বিশ্লেষণ দেখো ▼":"🤖 AI বিশ্লেষণ করো"}
          </button>
          ${n.link?`<a href="${n.link}" target="_blank" class="link-btn">↗</a>`:""}
        </div>
      </div>
      ${has?aiPanel(sums[n.id]):""}
    </div>`;
  });
  document.getElementById("content").innerHTML=h;
  document.getElementById("sAnal").textContent=analyzed;
}
function aiPanel(txt){const c=sc(txt);return`<div class="ai-panel"><div class="ai-header"><span class="ai-dot"></span><span class="ai-label">AI বাংলা বিশ্লেষণ</span><span class="sentiment" style="background:${c}18;color:${c}">${sl(txt)}</span></div><div class="ai-text">${txt}</div></div>`}
async function analyze(id,idx){
  const btn=document.getElementById(`ab${idx}`);
  const card=document.getElementById(`c${idx}`);
  const item=news.find(n=>n.id===id);
  if(!item)return;
  if(sums[id]){const p=card.querySelector(".ai-panel");if(p){p.remove();btn.textContent="🤖 বিশ্লেষণ দেখো ▼"}else{card.insertAdjacentHTML("beforeend",aiPanel(sums[id]));btn.textContent="🤖 বিশ্লেষণ বন্ধ করো ▲"}return}
  btn.innerHTML=`<span class="ldots"><span style="animation-delay:0s"></span><span style="animation-delay:0.2s"></span><span style="animation-delay:0.4s"></span></span> বিশ্লেষণ হচ্ছে...`;
  btn.disabled=true;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:`তুমি একজন stock market expert। বাংলায় analyze করো:\n📌 সারসংক্ষেপ:\n📈 Market Impact: (Bullish/Bearish/Neutral)\n🎯 কোন Stocks:\n⚡ Action:`,messages:[{role:"user",content:`Title: ${item.title}\nSource: ${item.source}\nContent: ${item.content}`}]})});
    const d=await r.json();
    const txt=d?.content?.[0]?.text||"বিশ্লেষণ পাওয়া যায়নি।";
    sums[id]=txt;analyzed++;
    document.getElementById("sAnal").textContent=analyzed;
    card.insertAdjacentHTML("beforeend",aiPanel(txt));
    btn.innerHTML="🤖 বিশ্লেষণ বন্ধ করো ▲";
    btn.className="analyze-btn done";
  }catch{btn.innerHTML="❌ আবার চেষ্টা করো"}
  btn.disabled=false;
}
function bulk(){const list=filter==="সব"?news:news.filter(n=>n.source===filter);list.slice(0,5).forEach((n,i)=>{if(!sums[n.id])analyze(n.id,i)})}
function toggleAuto(){autoOn=!autoOn;const b=document.getElementById("autoBtn");if(autoOn){b.textContent="⏱ AUTO";b.className="btn active";document.getElementById("sNext").textContent="৫ মিনিটে";startTimer()}else{b.textContent="⏸ PAUSED";b.className="btn";document.getElementById("sNext").textContent="বন্ধ";if(timer)clearInterval(timer)}}
function startTimer(){if(timer)clearInterval(timer);let s=300;timer=setInterval(()=>{s--;const m=Math.floor(s/60),sec=s%60;document.getElementById("sNext").textContent=`${m}:${sec.toString().padStart(2,"0")}`;if(s<=0){loadNews();s=300}},1000)}
loadNews();startTimer();
</script>
</body>
  </html>
